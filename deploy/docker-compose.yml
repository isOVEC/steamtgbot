version: '3.8'

volumes:
  steam_db:
  steam_logs:

services:
  steam-bot:
    build: 
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: steam-inventory-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - STEAM_API_KEY=${STEAM_API_KEY}
      - PROXY_URL=${PROXY_URL:-}
      - PROXY_ENABLED=${PROXY_ENABLED:-false}
      - CHECK_INTERVAL_MINUTES=${CHECK_INTERVAL_MINUTES:-30}
    volumes:
      - steam_db:/app
      - steam_logs:/app/bot_logs
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[m]ain.py' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - steam-bot-network

networks:
  steam-bot-network:
    driver: bridge
