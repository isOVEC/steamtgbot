version: '3.8'

services:
  steam-bot:
    build: 
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: steam-inventory-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - STEAM_API_KEY=${STEAM_API_KEY}
      - PROXY_URL=${PROXY_URL:-}
      - PROXY_ENABLED=${PROXY_ENABLED:-false}
      - CHECK_INTERVAL_MINUTES=${CHECK_INTERVAL_MINUTES:-30}
      - MIN_CHECK_INTERVAL=${MIN_CHECK_INTERVAL:-5}
      - MAX_CHECK_INTERVAL=${MAX_CHECK_INTERVAL:-1440}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - RETRY_DELAY=${RETRY_DELAY:-5}
      - EXPONENTIAL_BACKOFF=${EXPONENTIAL_BACKOFF:-true}
      - DEFAULT_GAME=${DEFAULT_GAME:-cs2}
      - DATABASE_PATH=/app/data/steam_monitor.db
    volumes:
      - steam_data:/app/data
      - steam_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[m]ain.py' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - steam-bot-network

volumes:
  steam_data:
  steam_logs:

networks:
  steam-bot-network:
    driver: bridge
